<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Pay Hike Arrear Calculator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .container { 
            max-width: 100%; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        h1, h2 { color: #2c3e50; }
        .input-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .input-group { 
            display: flex; 
            flex-direction: column; 
        }
        label { 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 13px; 
        }
        input, select, button { 
            padding: 9px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
        }
        button { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s; 
            margin-top: 10px; 
        }
        button:hover { 
            background-color: #2980b9; 
        }
        .btn-generate {
            width: 100%; 
            font-size: 18px; 
            padding: 15px; 
            background-color: #27ae60;
        }
        .btn-generate:hover {
            background-color: #219653;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            font-size: 12px; 
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 6px; 
            text-align: right; 
        }
        th { 
            background-color: #2c3e50; 
            color: white; 
            text-align: center; 
            position: sticky;
            top: 0;
        }
        .drawn-col { background-color: #fdf2e9; }
        .due-col { background-color: #e8f8f5; }
        .arrear-col { background-color: #ebdef0; font-weight: bold; }
        td:first-child { text-align: left; font-weight: bold; }
        .text-center { text-align: center; }
        .table-container { overflow-x: auto; max-height: 800px; }
        .summary-box { background: #2c3e50; color: white; padding: 20px; border-radius: 5px; text-align: center; font-size: 24px; margin-top: 20px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Grade Pay Hike Arrear Calculator (HC to ASI)</h1>
    
    <div class="input-grid">
        <div class="input-group">
            <label>April 2017 Drawn BP (₹)</label>
            <input type="number" id="apr2017BP" value="25640">
        </div>
        <div class="input-group">
            <label>HC GP Hike Diff (₹)</label>
            <input type="number" id="hcHike" value="600" title="Difference from 6200 to 6800">
        </div>
        <div class="input-group">
            <label>ASI Extra GP Hike (₹)</label>
            <input type="number" id="asiHikeExtra" value="600" title="Extra difference from 6800 to 7400">
        </div>
        <div class="input-group">
            <label>MACP Date</label>
            <input type="month" id="macpDate" value="2021-08">
        </div>
        <div class="input-group">
            <label>ASI Promotion Date</label>
            <input type="month" id="promoDate" value="2021-11">
        </div>
    </div>
    
    <button class="btn-generate" onclick="generateSheet()">Calculate Arrears & Generate Sheet</button>

    <div id="totalArrearBox" class="summary-box" style="display:none;">
        Total Estimated Arrear: ₹<span id="totalArrearAmount">0</span>
    </div>

    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th rowspan="2">Month/Year</th>
                    <th rowspan="2">DA %</th>
                    <th colspan="3" class="drawn-col">ACTUAL DRAWN PAY (Old GP)</th>
                    <th colspan="3" class="due-col">ENTITLED DUE PAY (Hiked GP)</th>
                    <th colspan="2" class="arrear-col">ARREAR CALCULATION</th>
                </tr>
                <tr>
                    <th class="drawn-col">Basic Pay</th>
                    <th class="drawn-col">Gross Pay</th>
                    <th class="drawn-col">Net Pay</th>
                    <th class="due-col">Basic Pay</th>
                    <th class="due-col">Gross Pay</th>
                    <th class="due-col">Net Pay</th>
                    <th class="arrear-col">Monthly Arrear</th>
                    <th class="arrear-col">Running Total</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const daTimeline = [
        { month: "2016-04", rate: 0.00 }, { month: "2016-07", rate: 0.02 }, { month: "2017-01", rate: 0.04 },
        { month: "2017-11", rate: 0.05 }, { month: "2018-05", rate: 0.07 }, { month: "2018-10", rate: 0.09 },
        { month: "2019-03", rate: 0.12 }, { month: "2019-10", rate: 0.17 }, { month: "2021-08", rate: 0.28 },
        { month: "2021-12", rate: 0.31 }, { month: "2022-04", rate: 0.34 }, { month: "2022-10", rate: 0.38 },
        { month: "2023-03", rate: 0.42 }, { month: "2023-12", rate: 0.46 }, { month: "2024-03", rate: 0.50 },
        { month: "2024-11", rate: 0.53 }, { month: "2025-03", rate: 0.55 }, { month: "2025-09", rate: 0.58 }
    ];

    const getOtherAllowance = (dateStr) => {
        if (dateStr >= "2023-10") return 3000;
        if (dateStr >= "2020-10") return 2500;
        return 1700;
    };

    const getMMLSAY = (dateStr) => {
        if (dateStr === "2024-01") return 450;
        if (dateStr >= "2024-02") return 225;
        return 0;
    };

    function getActiveDA(dateStr) {
        let currentDA = 0;
        for (let i = 0; i < daTimeline.length; i++) {
            if (dateStr >= daTimeline[i].month) currentDA = daTimeline[i].rate;
        }
        return currentDA;
    }

    function generateSheet() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        const baseBPApr17 = parseFloat(document.getElementById('apr2017BP').value);
        const hcHike = parseFloat(document.getElementById('hcHike').value);
        const asiHikeExtra = parseFloat(document.getElementById('asiHikeExtra').value);
        const macpDate = document.getElementById('macpDate').value;
        const promoDate = document.getElementById('promoDate').value;

        // Base 2016 Calculations
        const drawnBaseBP2016 = Math.ceil((baseBPApr17 / 1.03) / 10) * 10;
        const dueBaseBP2016 = drawnBaseBP2016 + hcHike;
        
        let drawnBP = drawnBaseBP2016;
        let dueBP = dueBaseBP2016;
        
        let totalArrear = 0;
        let startYear = 2016;
        let startMonth = 4;

        for (let i = 0; i < 123; i++) { 
            let date = new Date(startYear, startMonth - 1 + i);
            let yyyy = date.getFullYear();
            let mm = String(date.getMonth() + 1).padStart(2, '0');
            let dateStr = `${yyyy}-${mm}`;

            // --- 1. CORE BP INCREMENTS & OVERRIDES ---
            
            // Standard July Increment
            if (mm === "07" && dateStr !== "2016-07") { 
                drawnBP = Math.ceil((drawnBP * 1.03) / 10) * 10;
                dueBP = Math.ceil((dueBP * 1.03) / 10) * 10;
            }
            if (dateStr === "2016-07") {
                drawnBP = baseBPApr17;
                dueBP = Math.ceil((dueBP * 1.03) / 10) * 10; 
            }

            // Specific Anomaly Fixes for the "Drawn" side, mapped logically to "Due" side
            if (dateStr === "2018-07") {
                drawnBP = 27210; // The documented +10 error
                dueBP += 10;     // Applying the exact same error bump to Due side to keep logic parallel
            }
            if (dateStr === "2018-11") {
                drawnBP = 28030; // CM Medal Fixed
                dueBP = Math.ceil((dueBP * 1.03) / 10) * 10; // CM Medal mathematically applied to Due
            }
            if (dateStr === "2019-10") {
                drawnBP = 28880; // Dept Manual Correction
                dueBP += 10;     // The correction was exactly +10 on the drawn scale
            }

            // MACP
            if (dateStr === macpDate) {
                drawnBP = Math.ceil((drawnBP * 1.03) / 10) * 10;
                dueBP = Math.ceil((dueBP * 1.03) / 10) * 10;
            }

            // ASI Promotion
            if (dateStr === promoDate) {
                drawnBP = Math.ceil((drawnBP * 1.03) / 10) * 10;
                dueBP = Math.ceil((dueBP * 1.03) / 10) * 10;
                dueBP += asiHikeExtra; // Apply the jump from 6800 to 7400 GP
            }

            // --- 2. ALLOWANCES & DEDUCTIONS ---
            
            let daRate = getActiveDA(dateStr);
            let drawnDA = Math.round(drawnBP * daRate);
            let dueDA = Math.round(dueBP * daRate);
            
            // Frozen HRA Rule (Same for both because it was a hardcoded Gov rule)
            let hraAmtDrawn = 0;
            let hraAmtDue = 0;
            if (dateStr >= "2016-04" && dateStr <= "2016-06") {
                hraAmtDrawn = 1680; hraAmtDue = 1680;
            } else if (dateStr >= "2016-07" && dateStr <= "2017-06") {
                hraAmtDrawn = 1730; hraAmtDue = 1730;
            } else if (dateStr >= "2017-07" && dateStr <= "2018-06") {
                hraAmtDrawn = 1790; hraAmtDue = 1790;
            } else {
                hraAmtDrawn = Math.round(drawnBP * 0.10);
                hraAmtDue = Math.round(dueBP * 0.10);
            }

            let otherAmt = getOtherAllowance(dateStr);
            let mmlsay = getMMLSAY(dateStr);
            let otherDed = 408;

            // Medical + CPA (5% Capped at 1700)
            let drawnCPA = Math.min(Math.round(drawnBP * 0.05), 1700);
            let drawnMedCPA = 600 + drawnCPA;
            
            let dueCPA = Math.min(Math.round(dueBP * 0.05), 1700);
            let dueMedCPA = 600 + dueCPA;

            // --- 3. FINAL TOTALS ---
            let drawnGross = drawnBP + drawnDA + hraAmtDrawn + otherAmt + drawnMedCPA;
            let drawnNPS = Math.round((drawnBP + drawnDA) * 0.10);
            let drawnNet = drawnGross - drawnNPS - mmlsay - otherDed;

            let dueGross = dueBP + dueDA + hraAmtDue + otherAmt + dueMedCPA;
            let dueNPS = Math.round((dueBP + dueDA) * 0.10);
            let dueNet = dueGross - dueNPS - mmlsay - otherDed;

            let monthlyArrear = dueNet - drawnNet;
            totalArrear += monthlyArrear;

            let row = `<tr>
                <td class="text-center">${date.toLocaleString('default', { month: 'short' })}-${yyyy}</td>
                <td class="text-center">${(daRate * 100).toFixed(0)}%</td>
                
                <td class="drawn-col">${drawnBP.toFixed(2)}</td>
                <td class="drawn-col">${drawnGross.toFixed(2)}</td>
                <td class="drawn-col"><strong>${drawnNet.toFixed(2)}</strong></td>
                
                <td class="due-col">${dueBP.toFixed(2)}</td>
                <td class="due-col">${dueGross.toFixed(2)}</td>
                <td class="due-col"><strong>${dueNet.toFixed(2)}</strong></td>
                
                <td class="arrear-col text-center">₹${monthlyArrear.toFixed(2)}</td>
                <td class="arrear-col text-center">₹${totalArrear.toFixed(2)}</td>
            </tr>`;
            
            tbody.innerHTML += row;
        }

        document.getElementById('totalArrearBox').style.display = 'block';
        document.getElementById('totalArrearAmount').innerText = totalArrear.toLocaleString('en-IN');
    }
</script>
</body>
</html>
