<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Corrected Arrear Calculator - Data Driven</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; cursor: pointer; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background: #2c3e50; color: white; }
        .total-box { font-size: 24px; font-weight: bold; color: #27ae60; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Corrected Arrear Calculator</h1>
    <div class="input-group">
        <label>ASI Promotion Date</label>
        <input type="month" id="promoDate" value="2021-11">
    </div>
    <div class="input-group">
        <label>Level 1 Pass Date (if applicable)</label>
        <input type="month" id="lvl1Date">
    </div>
    <div class="input-group">
        <label>Paste your verified BP History (Month-Year [tab] Amount):</label>
        <textarea id="bulkDataText"></textarea>
    </div>
    <button onclick="calculate()">Calculate Accurate Arrear</button>

    <div id="result" class="total-box"></div>
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Month</th><th>Drawn GP</th><th>Drawn BP</th><th>Due GP</th><th>Due BP</th><th>Diff</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
function calculate() {
    const promoDate = document.getElementById('promoDate').value;
    const lvl1Date = document.getElementById('lvl1Date').value;
    const rawData = document.getElementById('bulkDataText').value.trim().split('\n');
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    
    let totalArrear = 0;

    rawData.forEach(line => {
        const parts = line.split('\t');
        if (parts.length < 2) return;
        
        const dateStr = parts[0].trim(); // Format: 16-Apr
        const drawnBP = parseFloat(parts[1].replace(/,/g, ''));
        
        // Convert "16-Apr" to "2016-04"
        const dSplit = dateStr.split('-');
        const monthMap = {"Jan": "01", "Feb": "02", "Mar": "03", "Apr": "04", "May": "05", "Jun": "06", 
                          "Jul": "07", "Aug": "08", "Sep": "09", "Oct": "10", "Nov": "11", "Dec": "12"};
        const yyyy = "20" + dSplit[0];
        const mm = monthMap[dSplit[1]];
        const currentMonth = `${yyyy}-${mm}`;

        // Determine Drawn GP
        let drawnGP = 6200;
        if (lvl1Date && currentMonth >= lvl1Date) drawnGP = 6400;

        // Determine Due GP (Court Case Entitlement)
        // Rule: Due GP is 6800 until Promo, then 7400
        let dueGP = (currentMonth >= promoDate && promoDate !== "") ? 7400 : 6800;

        // Calculate Due BP: Drawn BP + (DueGP - DrawnGP)
        let dueBP = drawnBP + (dueGP - drawnGP);
        
        // Basic Pay Arrear for this month
        let monthlyArrear = (dueBP - drawnBP);
        totalArrear += monthlyArrear;

        tbody.innerHTML += `<tr>
            <td>${currentMonth}</td>
            <td>${drawnGP}</td>
            <td>${drawnBP.toFixed(0)}</td>
            <td>${dueGP}</td>
            <td>${dueBP.toFixed(0)}</td>
            <td>${monthlyArrear.toFixed(0)}</td>
        </tr>`;
    });

    document.getElementById('result').innerText = "Total Arrear (Basic Pay only): ₹" + totalArrear.toLocaleString('en-IN');
}
</script>
</body>
</html>
